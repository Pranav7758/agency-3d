kind = "web"
previewPath = "/"
title = "Digi Mirai"
version = "1.0.0"
id = "artifacts/digi-mirai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19487

[services.development]
run = "pnpm --filter @workspace/digi-mirai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digi-mirai", "run", "build" ]
publicDir = "artifacts/digi-mirai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19487"
BASE_PATH = "/"
